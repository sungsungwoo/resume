<body>
  <div class="site">

    <div id="site-header"></div>

    <main>
      <section id="contact" class="section">
        <div class="section-title">
          <span class="brand-mark"></span>
          <h2>Let's talk</h2>
        </div>

        <form class="contact-card" action="https://formsubmit.co/swsung73@gmail.com" method="POST">
          <input type="hidden" name="_subject" value="Portfolio Contact - New Message" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_next" value="https://resume.swsung72.site" />
          <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

          <div class="form-row">
            <label>
              First Name *
              <input type="text" name="firstName" autocomplete="given-name" required />
            </label>
            <label>
              Last Name *
              <input type="text" name="lastName" autocomplete="family-name" required />
            </label>
          </div>

          <label>
            Email *
            <input type="email" name="email" autocomplete="email" required />
          </label>

          <label>
            Subject
            <input type="text" name="subject" autocomplete="off" />
          </label>

          <label>
            Message
            <textarea name="message" rows="5"></textarea>
          </label>

          <button class="send" type="submit">Send</button>
        </form>
      </section>
    </main>

    <div id="site-footer"></div>

  </div>
</body>
